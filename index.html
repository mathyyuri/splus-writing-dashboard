<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S+ Writing Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#edf5ea; --card:#f9fdf7; --line:#d9e7d5;
  --main:#233222; --sub:#6f7d6c; --point:#7da27b;
  --gold:#d4af37; --silver:#a8a8a8; --bronze:#cd7f32;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); font-family:'Noto Sans KR', sans-serif; color:var(--main); padding:42px 20px 80px; }
.container{ max-width:1000px; margin:auto; }

/* HEADER */
.header{ text-align:center; margin-bottom:50px; }
.logo{ font-family:'Cormorant Garamond', serif; font-size:60px; line-height:1; font-weight:600; margin-bottom:10px; }
.logo span{ color:var(--point); font-style:italic; }
.sub{ color:var(--sub); font-size:13px; letter-spacing:0.2em; font-weight:500; }

/* TOP 3 RANKING BOX */
.top-ranking { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 40px; padding: 20px; }
.rank-card { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
.rank-card:hover { transform: translateY(-5px); }

/* 순위별 높이 및 강조 */
.rank-1 { order: 2; width: 35%; height: 220px; border: 2px solid var(--gold); }
.rank-2 { order: 1; width: 30%; height: 180px; }
.rank-3 { order: 3; width: 30%; height: 160px; }

.medal { font-size: 30px; margin-bottom: 10px; display: block; }
.rank-name { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
.rank-class { font-size: 12px; color: var(--sub); margin-bottom: 10px; }
.rank-score { font-size: 28px; font-weight: 800; color: var(--point); }
.rank-score span { font-size: 14px; font-weight: 400; margin-left: 2px; }

/* TABLE */
.table-card { background: var(--card); border: 1px solid var(--line); border-radius: 30px; padding: 20px; box-shadow: 0 10px 28px rgba(0,0,0,0.03); }
table { width: 100%; border-collapse: collapse; }
th { padding: 15px; font-size: 13px; color: var(--sub); border-bottom: 2px solid var(--line); text-align: center; }
td { padding: 18px 15px; text-align: center; border-bottom: 1px solid #f0f4ef; font-size: 15px; }
.row-rank { font-weight: 700; color: var(--sub); width: 60px; }
.row-name { font-weight: 700; font-size: 16px; }
.row-score { font-weight: 700; color: var(--point); }

.footer { text-align: center; margin-top: 50px; color: var(--sub); font-size: 12px; opacity: 0.8; }

@media(max-width:600px){
  .top-ranking { flex-direction: column; align-items: center; }
  .rank-card { width: 100% !important; height: auto !important; order: unset !important; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">S+ Writing<br><span>Ranking</span></div>
    <div class="sub">MATHY YURI · PREMIUM ACCUMULATED SCORE</div>
  </div>

  <div id="topSection" class="top-ranking">
    </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>RANK</th>
          <th>이름</th>
          <th>반</th>
          <th>누적 총점</th>
        </tr>
      </thead>
      <tbody id="tbody">
        </tbody>
    </table>
  </div>

  <div class="footer">
    DAECHI S+ ACADEMY · Individualized Logic Mastery System
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzlCHDzIVbeZld0A2E10eoQGzYZjzBjIYTDLJZlo2DOMZAPvXOvMdHYqYbXvKYf5qNuwA/exec';

fetch(SHEET_URL)
.then(res => res.json())
.then(data => {
  // 1. 이름별 누적 점수 계산
  const studentMap = {};

  data.forEach(row => {
    const name = String(row["이름"] || "").trim();
    const sClass = String(row["반"] || "").trim();
    const score = Number(row["점수"] || 0);

    if(!name) return;

    if(!studentMap[name]) {
      studentMap[name] = { name: name, class: sClass, totalScore: 0 };
    }
    studentMap[name].totalScore += score;
  });

  // 2. 객체를 배열로 변환 후 점수순 정렬
  const rankingArray = Object.values(studentMap).sort((a, b) => b.totalScore - a.totalScore);

  // 3. TOP 3 렌더링
  const topSection = document.getElementById('topSection');
  const medals = ["🥇", "🥈", "🥉"];
  const top3Html = rankingArray.slice(0, 3).map((student, idx) => `
    <div class="rank-card rank-${idx + 1}">
      <span class="medal">${medals[idx]}</span>
      <div class="rank-name">${student.name}</div>
      <div class="rank-class">${student.class}</div>
      <div class="rank-score">${student.totalScore}<span>pts</span></div>
    </div>
  `).join('');
  topSection.innerHTML = top3Html;

  // 4. 전체 리스트 렌더링
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rankingArray.map((student, idx) => `
    <tr>
      <td class="row-rank">${idx + 1}</td>
      <td class="row-name">${student.name}</td>
      <td>${student.class}</td>
      <td class="row-score">${student.totalScore}</td>
    </tr>
  `).join('');

})
.catch(err => {
  console.error(err);
  document.getElementById('tbody').innerHTML = '<tr><td colspan="4" style="padding:40px; color:red;">데이터 로드 중 오류가 발생했습니다.</td></tr>';
});
</script>

</body>
</html>
